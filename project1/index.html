<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact form</title>
    <link rel="stylesheet"href="style.css">
</head>
<body>
    <div class="container">
    <div class="apply_box">
        <H1>
            JOB APPLICATION(WEB)
        </H1>
        <div class ="form_container">
            <div class ="form_control">
                <label for="first_name">first_name</label>
                <input
                id="first_name"
                name="first_name"
                placeholder="Enter first name"
        />
        </div>
        <div class ="form_container">
                <div class ="form_control">
                <label for="Last_name">Last_name</label>
                <input
                id="Last_name"
                name="Last_name"
                placeholder="Enter last name"
            />
            </div>
            <div class ="form_container">
            <div class ="form_control">
                <label for="Email_id">Email_id</label>
                <input
                id="email"
                name="email"
                placeholder="Enter email_id"
        />
        </div>
        <div class ="form_container">
            <div class ="form_control">
                <label for="job role">job role</label>
                <select id="job role" name="job role">
                 <option value="">select job role</option>
                 <option value="frontend">frontend developer</opttion>
                 <option value="backend">backend developer</opttion>
                 <option value="frontend">full stack developer</opttion>
                <option value="ui-ux">ui-ux</opttion>
                </select>
                /div>
            <div class ="form_container">
            <div class ="form_control">
                <label for="address">address</label>
                <textarea
                id="address"
                name="address"
                row="4"
                cols="50"
                placeholder:"enter address">
            </textarea>
            <div class ="form_container">
            <div class ="form_control">
                <label for="city">city</label>
                <input
                id="city"
                name="city_name"
                placeholder="Enter city name"
                />
             </div>
             <div class ="form_container">
            <div class ="form_control">
                <label for="pincode">pincode</label>
                <input
                type="number"
                id="pincode"
                name="pincode"
                placeholder="Enter pincode"
        />
        </div>
        <div class ="form_container">
            <div class ="form_control">
                <label for="Date">Date</label>
                <input type="date" id="Date" name="Date"/>
        </div>
            <div class ="form_control">
                <label for="upload">upload your cv</label>
                <input type="file" id="upload" name="upload"/>
        </div>
      </div>
      <div class="button_container">apply now
        <button type="submit">apply now</button>
    
</body>
</html>
